# Publishes the built site to GitHub Pages when you push to main.
# After the first successful run, your site will be at:
#   https://unipluseducationact-ctrl.github.io/S3-CH5-table/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Re-run after repo rename so Pages serves the latest dist/, not a stale deployment.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify build includes current app shell
        run: |
          grep -q 'flashcards-page' dist/index.html
          grep -q 'worksheet-hub' dist/index.html
          grep -q 'data-page="flashcards"' dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
