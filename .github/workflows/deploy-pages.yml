# Publishes the built site to GitHub Pages when you push to main.
# After the first successful run, your site will be at:
#   https://unipluseducationact-ctrl.github.io/S3-Chem/
# Old URL https://…/S3-CH5-table/ is preserved via pages-redirect/ (see pages-redirect/README.md).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Re-run after repo rename so Pages serves the latest dist/, not a stale deployment.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify build includes current app shell
        run: |
          grep -q 'flashcards-page' dist/index.html
          grep -q 'worksheet-hub' dist/index.html
          grep -q 'data-page="flashcards"' dist/index.html
          test -f dist/public/notes/topic-01-planet-earth.pdf
          grep -q 'notes-pdf-frame' dist/index.html
          grep -q 'summary-hub' dist/index.html
          grep -q 'summary-panel-topic-2' dist/index.html
          test -f dist/public/summary/topic-02/01-elements-and-isotopes.png
          test -f dist/public/summary/topic-02/01-elements-and-isotopes.webp
          test -f dist/public/tools/chem-catch/index.html
          test -f dist/public/worksheets/cursor-chem/index.html
          test -f dist/public/tools/flame-test-fireworks/assets/backgrounds/city-skyline-3.jpg
          test -f dist/public/three.min.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
