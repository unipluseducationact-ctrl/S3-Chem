# Publishes the built site to GitHub Pages when you push to main.
# After the first successful run, your site will be at:
#   https://unipluseducationact-ctrl.github.io/S3-Chem/
# Old URL https://…/S3-CH5-table/ is preserved via pages-redirect/ (see pages-redirect/README.md).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Re-run after repo rename so Pages serves the latest dist/, not a stale deployment.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify build includes current app shell
        run: |
          grep -q 'flashcards-page' dist/index.html
          grep -q 'worksheet-hub' dist/index.html
          grep -q 'data-page="flashcards"' dist/index.html
          test -f dist/public/notes/topic-01-planet-earth.pdf
          grep -q 'notes-pdf-frame' dist/index.html
          grep -q 'summary-hub' dist/index.html
          grep -q 'summary-panel-topic-2' dist/index.html
          test -f dist/public/summary/topic-02/01-elements-and-isotopes.png
          test -f dist/public/summary/topic-02/01-elements-and-isotopes.webp
          test -f dist/public/tools/chem-catch/index.html
          test -f dist/public/worksheets/cursor-chem/index.html
          test -f dist/public/worksheets/ch2-microscopic-world-1/worksheet.html
          test -f dist/public/worksheets/ch2-microscopic-world-1/pdf-question-bank.json
          test -f dist/public/tools/flame-test-fireworks/assets/backgrounds/city-skyline-3.jpg
          test -f dist/public/three.min.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
        timeout-minutes: 10

      - name: Wait for in-progress Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        timeout-minutes: 10

      - name: Wait before final deploy attempt
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        timeout-minutes: 10

      - name: Fail if all deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && (steps.deployment.outcome == 'failure' || steps.deployment.outcome == 'skipped')
        run: |
          echo "All GitHub Pages deploy attempts failed."
          exit 1
