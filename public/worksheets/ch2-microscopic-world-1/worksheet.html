<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HKDSE Chem — Microscopic world 1 worksheet</title>
  <link rel="stylesheet" href="../../../css/worksheet-styles.css?v=2.1.7">
  <link rel="stylesheet" href="../ch5-shared/ch5-embed-base.css?v=2">
  <link rel="stylesheet" href="microscopic-world-worksheet.css?v=1">
  <script src="../ch5-shared/ch5-embed-ui.js?v=2"></script>
  <style>
    @media print {
      @page { size: auto; margin: 10mm; }
      html, body {
        height: auto !important; min-height: 0 !important; margin: 0 !important;
        padding: 0 !important; background: #fff !important; color: #111 !important;
        overflow: visible !important;
      }
      .worksheet-generator-page, .worksheet-controls, .worksheet-preview { display: none !important; }
      #pdfSheet {
        visibility: visible !important; position: static !important; left: auto !important;
        top: auto !important; width: 100% !important; max-width: none !important;
        height: auto !important; min-height: 0 !important; overflow: visible !important;
        margin: 0 !important; padding: 0 !important; pointer-events: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="worksheet-generator-page microscopic-world-page ch5-embed-page">
    <div class="worksheet-container">
      <aside class="worksheet-controls">
        <div class="controls-header">
          <h2 id="appTitle">Worksheet Generator</h2>
          <p id="appSubtitle">Create Topic 2 worksheets for your class</p>
        </div>
        <div class="control-group">
          <label id="lblCount">Number of Questions</label>
          <div class="button-group" id="question-count-group"></div>
          <input type="number" id="numCount" class="control-input count-input-hidden" min="1" max="50" value="10" aria-label="Custom question count" tabindex="-1" />
        </div>
        <div class="control-group">
          <label id="lblTypes">Question Types</label>
          <div id="typeChecks" class="checkbox-group"></div>
        </div>
        <div class="control-group">
          <label id="lblDiff">Difficulty</label>
          <input type="hidden" id="selDiff" value="medium" />
          <div class="button-group" id="difficulty-group"></div>
        </div>
        <div class="control-group">
          <label id="lblLang">Language</label>
          <div class="button-group" id="lang-group">
            <button type="button" class="option-btn active" id="btnLangEn">English</button>
            <button type="button" class="option-btn" id="btnLangZh">繁體中文</button>
          </div>
        </div>
        <div class="control-group">
          <label for="txtSeed" id="lblSeed">Random seed (optional)</label>
          <input type="text" id="txtSeed" class="control-input" placeholder="e.g. classA-2026" />
        </div>
        <button type="button" class="generate-btn" id="btnGenerate">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v1m0 16v1m-9-9h1m16 0h1m-2.64-6.36l-.7.7m-12.02 12.02l-.7.7m0-12.72l.7.7m12.02 12.02l.7.7" />
            <circle cx="12" cy="12" r="4" />
          </svg>
          <span id="btnGenerateLabel">Generate Worksheet</span>
        </button>
        <div class="trust-text" id="trustText">Questions are drawn primarily from Topic 02 Overall 1 (Unit Education).</div>
      </aside>
      <section class="worksheet-preview">
        <div class="preview-header">
          <div class="preview-tabs">
            <button type="button" class="preview-tab active" data-mode="print" id="tabPrint">Print</button>
            <button type="button" class="preview-tab" data-mode="practice" id="tabPractice">Practice</button>
            <button type="button" class="preview-tab" data-mode="answer" id="tabAnswer">Answer Key</button>
          </div>
          <div class="export-buttons">
            <button type="button" class="export-btn" id="btnExportPrint" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              <span id="btnExportPrintLabel">Print</span>
            </button>
            <button type="button" class="export-btn" id="btnToday" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              <span id="btnTodayLabel">Today</span>
            </button>
            <button type="button" class="export-btn" id="btnDocQ" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              <span id="btnDocQLabel">Word — Questions</span>
            </button>
            <button type="button" class="export-btn" id="btnDocA" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              <span id="btnDocALabel">Word — Answers</span>
            </button>
          </div>
        </div>
        <div class="preview-content" id="previewContent">
          <div id="previewPlaceholder" class="preview-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <line x1="10" y1="9" x2="8" y2="9"></line>
            </svg>
            <p id="placeholderText">Click 'Generate Worksheet' to create practice problems</p>
          </div>
          <div id="printView" class="preview-mode-panel sheet-preview-body" hidden></div>
          <div id="practiceView" class="preview-mode-panel" hidden>
            <div class="practice-toolbar">
              <p class="practice-hint" id="txtPracticeHint">First wrong: hint only. Second wrong: model answer.</p>
              <button type="button" class="session-summary-btn" id="btnSummary">Session summary</button>
            </div>
            <div id="summaryPanel" class="summary-panel" hidden role="region" aria-live="polite"></div>
            <div id="quizArea" class="quiz-empty"></div>
          </div>
          <div id="answerView" class="preview-mode-panel sheet-preview-body" hidden></div>
        </div>
      </section>
    </div>
  </div>
  <div id="pdfSheet" aria-hidden="true"></div>
  <script src="worksheet-logic.js?v=20260628b"></script>
</body>
</html>
