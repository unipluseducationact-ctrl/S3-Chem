  function createRng(seed) {
    let s = (seed >>> 0) || 1;
    return {
      random() {
        s = (1664525 * s + 1013904223) >>> 0;
        return s / 0x100000000;
      },
      randint(a, b) {
        return a + Math.floor(this.random() * (b - a + 1));
      },
      choice(arr) {
        return arr[Math.floor(this.random() * arr.length)];
      },
      shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(this.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      },
    };
  }

  async function stableSeed(userSeed, count, types, difficulty) {
    const raw = `${userSeed || ""}|${count}|${[...types].sort().join(",")}|${difficulty}`;
    const subtle = typeof crypto !== "undefined" && crypto.subtle;
    if (subtle && typeof subtle.digest === "function") {
      const enc = new TextEncoder().encode(raw);
      const buf = await subtle.digest("SHA-256", enc);
      const hex = Array.from(new Uint8Array(buf), (b) => b.toString(16).padStart(2, "0")).join("");
      return parseInt(hex.slice(0, 8), 16) >>> 0;
    }
    let h = 2166136261 >>> 0;
    for (let i = 0; i < raw.length; i++) {
      h ^= raw.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h >>> 0;
  }

  function allowedByDifficulty(q, difficulty) {
    if (difficulty === "easy") return q.qtype === "mcq" || q.qtype === "calc" || q.qtype === "isotope";
    if (difficulty === "medium") return ["mcq", "calc", "short", "symbol", "isotope"].includes(q.qtype);
    return true;
  }

  function mcqParticleCharge(rng, diff) {

      ans_en = "+1";
      ans_zh = "+1";
    } else if (particle === "electron") {
      correct = 1;
      ans_en = "-1";
      ans_zh = "-1";
    } else {
      correct = 2;
      ans_en = "0";
      ans_zh = "0";
    }

    const opts_en = order.map((i) => base[i]);
    const opts_zh = order.map((i) => base[i]);
    const ci = order.indexOf(correct);
    const names = { proton: ["proton", "質子"], electron: ["electron", "電子"], neutron: ["neutron", "中子"] };
    const [ne, nz] = names[particle];
    return {
      id: "mcq_charge",

  async function generateQuestions(count, types, difficulty, userSeed) {
    const seed = await stableSeed(String(userSeed || ""), count, types, difficulty);
    const rng = createRng(seed);
    let buildersFlat = [];
    types.forEach((t) => {
      (BUILDERS[t] || []).forEach((b) => buildersFlat.push(b));
    });
    if (!buildersFlat.length) buildersFlat = [mcqNeutral];
    const out = [];
    for (let i = 0; i < count; i++) {
      let builder = rng.choice(buildersFlat);
      let q = builder(rng, difficulty);
      let guard = 0;
      while (!allowedByDifficulty(q, difficulty) && guard < 20) {
        builder = rng.choice(buildersFlat);
        q = builder(rng, difficulty);
        guard++;
      }
      q.id = q.id + "_" + i;
      out.push(q);
    }
    return out;
  }

  function buildRevisionSuggestions(total, correct, firstTry, failed, incomplete, byType) {
    const lines = [];
    const seen = new Set();
    function addLine(s) {
      if (!s || seen.has(s)) return;
      seen.add(s);
      lines.push(s);
    }

    const pctAll = total ? Math.round((100 * correct) / total) : 0;
    const ftPctAll = total ? Math.round((100 * firstTry) / total) : 0;

    if (pctAll >= 85) addLine(t("revBandExcellent"));
    else if (pctAll >= 65) addLine(t("revBandGood"));
    else if (pctAll >= 40) addLine(t("revBandFair"));
    else addLine(t("revBandLow"));

    const typeRows = [];
    byType.forEach((agg, tid) => {
      if (!agg || !agg.total) return;
      const pct = Math.round((100 * agg.correct) / agg.total);
      typeRows.push({
        name: qtypeLabel(tid),
        total: agg.total,
        correct: agg.correct,
        pct
      });
    });
    typeRows.sort((a, b) => a.pct - b.pct || b.total - a.total);

    let weakPick = typeRows.filter((r) => r.total >= 2 && r.pct < 66);
    if (!weakPick.length) weakPick = typeRows.filter((r) => r.total >= 1 && r.pct < 50);
    weakPick = weakPick.slice(0, 2);

    weakPick.forEach((r) => {
      addLine(
        revFill(t("revWeakOne"), {
          type: r.name,
          c: String(r.correct),
          t: String(r.total),
          pct: String(r.pct)
        })
      );
    });

    const strongOnes = typeRows.filter((r) => r.total >= 2 && r.pct === 100);
    if (strongOnes.length && !weakPick.length) {
      const r0 = strongOnes[0];
      addLine(
        revFill(t("revStrongOne"), {
          type: r0.name,
          n: String(r0.total)
        })
      );
    }

    if (total >= 4 && pctAll >= 45 && ftPctAll < 40) {
      addLine(t("revFirstTryLow"));
    }

    if (failed.length) addLine(t("revTwoStrike"));

    if (incomplete.length) addLine(t("revIncomplete"));

    if (!weakPick.length && typeRows.length >= 2 && pctAll >= 35 && pctAll < 78) {
      addLine(t("revBalanced"));
    }

    return lines;
  }

  function normAns(s) {
    return String(s)
      .trim()
      .toLowerCase()
      .replace(/\s+/g, " ")
      .replace(/，/g, ",")
      .replace(/、/g, ",");
  }

  function checkText(q, raw) {
    const u = normAns(raw);
    if (!u) return false;
    const lists = [...(q.accepted_answers_en || []), ...(q.accepted_answers_zh || [])];
    if (lists.some((a) => u === normAns(a))) return true;
    for (const a of lists) {
      const t = normAns(a);
      if (t && u.includes(t) && u.length <= t.length + 8) return true;
    }
    return false;
  }

        if (q.options_en && q.correct_index != null) {
          const ce = q.options_en[q.correct_index];
          const cz = (q.options_zh || q.options_en)[q.correct_index];
          html += "<strong>Answer / 答案：</strong> (" + (q.correct_index + 1) + ") " + escHtml(ce) + " / " + escHtml(cz) + "<br/>";
        } else {
          html += "<strong>Answer (EN)：</strong> " + escHtml(q.answer_en) + "<br/>";
          html += "<strong>答案（中文）：</strong> " + escHtml(q.answer_zh) + "<br/>";
        }
        html += "<em>Hint / 提示：</em> " + escHtml(q.hint_en) + " | " + escHtml(q.hint_zh);
      }
      html += "</div>";
    });
    return html;
  }

  function fillPdfSheet(answersMode) {
    document.getElementById("pdfSheet").innerHTML = buildPdfInnerHtml(answersMode);
  }

  function downloadWord(answersMode) {
    if (!lastQuestions.length) {
      alert(lang === "zh" ? "請先產生題目。" : "Generate questions first.");
      return;
    }
    const titleEn = answersMode ? "Atomic structure — Answers" : "Atomic structure — Questions";
    const titleZh = answersMode ? "原子結構 — 答案" : "原子結構 — 試題";
    let body = "";
    lastQuestions.forEach((q, i) => {
      body += "<h2>Q" + (i + 1) + " [" + escHtml(q.qtype) + "]</h2>";
      body += "<p><b>EN:</b> " + escHtml(q.stem_en) + "</p>";
      body += "<p><b>中文：</b> " + escHtml(q.stem_zh) + "</p>";
      if (q.options_en && !answersMode) {
        body += "<ul>";
        q.options_en.forEach((op, j) => {
          const oz = q.options_zh ? q.options_zh[j] : "";
          body += "<li>" + escHtml(op) + " / " + escHtml(oz) + "</li>";
        });
        body += "</ul>";
      }
      if (answersMode) {
        if (q.options_en && q.correct_index != null) {
          const ce = q.options_en[q.correct_index];
          const cz = (q.options_zh || q.options_en)[q.correct_index];
          body += "<p><b>Answer / 答案：</b> (" + (q.correct_index + 1) + ") " + escHtml(ce) + " / " + escHtml(cz) + "</p>";
        } else {
          body += "<p><b>Answer (EN):</b> " + escHtml(q.answer_en) + "</p>";
          body += "<p><b>答案（中文）:</b> " + escHtml(q.answer_zh) + "</p>";
        }
        body += "<p><i>Hint / 提示:</i> " + escHtml(q.hint_en) + " | " + escHtml(q.hint_zh) + "</p>";
      }
    });
    const html =
      "<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" " +
      "xmlns:w=\"urn:schemas-microsoft-com:office:word\" xmlns=\"http://www.w3.org/TR/REC-html40\">" +
      "<head><meta charset=\"utf-8\"><title>" +
      escHtml(titleEn) +
      "</title></head><body>" +
      "<h1>" +
      escHtml(titleEn) +
      "</h1><h2 style=\"font-size:14pt\">" +
      escHtml(titleZh) +
      "</h2>" +
      body +
      "</body></html>";
    const blob = new Blob(["\ufeff", html], { type: "application/msword" });
    const a = document.createElement("a");
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
    a.href = URL.createObjectURL(blob);
    a.download = (answersMode ? "atomic_answers_" : "atomic_questions_") + ts + ".doc";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function printSheet(answersMode) {
    if (!lastQuestions.length) {
      alert(lang === "zh" ? "請先產生題目。" : "Generate questions first.");
      return;
    }
    fillPdfSheet(answersMode);
    window.print();
  }

  function fillTodayDate() {
    if (!lastQuestions.length) return;
    if (sheetDate) {
      sheetDate = "";
    } else {
      const today = new Date();
      if (lang === "zh") {
        sheetDate = today.getFullYear() + "年" + (today.getMonth() + 1) + "月" + today.getDate() + "日";
      } else {
        sheetDate = today.toLocaleDateString("en", { year: "numeric", month: "short", day: "numeric" });
      }
    }
    renderSheetPreviews();
  }

  document.getElementById("numCount").addEventListener("input", syncCountPills);
  document.getElementById("btnLangEn").addEventListener("click", () => {
    lang = "en";
    applyLang();
  });
  document.getElementById("btnLangZh").addEventListener("click", () => {
    lang = "zh";
    applyLang();
  });
  document.getElementById("btnGenerate").addEventListener("click", generate);
  document.querySelectorAll(".preview-tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".preview-tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      currentViewMode = tab.dataset.mode || "print";
      renderViewMode();
      if (lastQuestions.length) {
        fillPdfSheet(currentViewMode === "answer");
      }
    });
  });
  document.getElementById("btnSummary").addEventListener("click", renderSummary);
  document.getElementById("btnDocQ").addEventListener("click", () => downloadWord(false));
  document.getElementById("btnDocA").addEventListener("click", () => downloadWord(true));
  document.getElementById("btnExportPrint").addEventListener("click", () => {
    const answersMode = currentViewMode === "answer";
    printSheet(answersMode);
  });
  document.getElementById("btnToday").addEventListener("click", fillTodayDate);

  setExportButtonsEnabled(false);
  applyLang();
})();
  </script>
</body>
</html>
