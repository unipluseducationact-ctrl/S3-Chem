<!DOCTYPE html>

<body>

<div class="worksheet-generator-page isotope-ram-page ch5-embed-page">
    <div class="worksheet-container">
        <aside class="worksheet-controls">
            <div class="controls-header">
                <h2 id="ui-generator-title">Worksheet Generator</h2>
                <p id="ui-subtitle">Create isotope &amp; RAM worksheets for your class</p>
            </div>

            <div class="control-group">
                <label id="ui-label-type">Question Type:</label>
                <select id="qType" class="control-input">
                    <option value="all">Mix of All Types</option>
                    <option value="1">Type 1: Calculate RAM</option>
                    <option value="2">Type 2: Calculate % Abundance</option>
                    <option value="3">Type 3: Calculate Isotopic Mass</option>
                </select>
            </div>

            <div class="control-group">
                <label id="ui-label-diff">Difficulty:</label>
                <input type="hidden" id="diff" value="easy">
                <div class="button-group" id="difficulty-group">
                    <button type="button" class="option-btn active" data-value="easy">Easy</button>
                    <button type="button" class="option-btn" data-value="medium">Medium</button>
                    <button type="button" class="option-btn" data-value="hard">Hard</button>
                </div>
            </div>

            <div class="control-group">
                <label id="ui-label-num">Number of Questions:</label>
                <div class="button-group" id="question-count-group">
                    <button type="button" class="option-btn active" data-value="5">5</button>
                    <button type="button" class="option-btn" data-value="10">10</button>
                    <button type="button" class="option-btn" data-value="15">15</button>
                    <button type="button" class="option-btn" data-value="20">20</button>
                </div>
                <input type="number" id="numQs" class="control-input count-input-hidden" value="5" min="1" max="20" tabindex="-1" aria-hidden="true">
            </div>

            <div class="control-group">
                <label id="ui-label-lang">Language</label>
                <div class="button-group" id="lang-group">
                    <button type="button" class="option-btn" id="btnLangEn">English</button>
                    <button type="button" class="option-btn active" id="btnLangZh">繁體中文</button>
                </div>
            </div>

            <button type="button" class="generate-btn" id="ui-btn-gen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 3v1m0 16v1m-9-9h1m16 0h1m-2.64-6.36l-.7.7m-12.02 12.02l-.7.7m0-12.72l.7.7m12.02 12.02l.7.7" />
                    <circle cx="12" cy="12" r="4" />

            </button>

        </aside>

        <section class="worksheet-preview">
            <div class="preview-header">
                <div class="preview-tabs">
                    <button type="button" class="preview-tab active" data-mode="print" id="tab-print">Print</button>
                    <button type="button" class="preview-tab" data-mode="practice" id="tab-practice">Practice</button>
                    <button type="button" class="preview-tab" data-mode="answer" id="tab-answer">Answer Key</button>
                </div>
                <div class="export-buttons">
                    <button type="button" class="export-btn" id="ui-btn-print" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        <span id="ui-btn-print-label">Print</span>
                    </button>
                    <button type="button" class="export-btn" id="ui-btn-solutions-pdf" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span id="ui-btn-solutions-pdf-label">Full solutions PDF</span>

                    <button type="button" class="export-btn" id="ui-btn-solutions-doc" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>

                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>

            <div class="preview-content" id="previewContent">

                    <div id="worksheet"></div>

</div>

    window.questionData = [];
    let lang = window.Ch5EmbedUI.readLangFromQuery("zh");

    function getLang() {

    function setExportButtonsEnabled(enabled) {

            ["ui-btn-print", "ui-btn-solutions-pdf", "ui-btn-solutions-doc", "ui-btn-worksheet-doc"],

    function updateUI() {

        document.documentElement.lang = l === "en" ? "en" : "zh-Hant";

        document.querySelectorAll("#difficulty-group .option-btn").forEach((btn) => {

            if (idx !== undefined) btn.textContent = i18n[l].diffs[idx];
        });

            renderPrintPreview();
            renderAnswerPreview();
            rebuildPracticeQuestions();

    function setLang(next) {
        lang = next;
        window.Ch5EmbedUI.setLangInQuery(next);

    function setDifficulty(value) {
        document.getElementById('diff').value = value;
        document.querySelectorAll('#difficulty-group .option-btn').forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.value === value);
        });

    function syncCountPills() {
        const val = String(document.getElementById('numQs').value);
        document.querySelectorAll('#question-count-group .option-btn').forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.value === val);
        });

    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    /**
     * Full worked solution (HTML) for teacher / PDF; language matches worksheet.
     */
    function buildFullSolution(ctx) {
        const { type, diff, l, elName, m1, m2, m3, p1, p2, p3, ram, ans } = ctx;
        const R = (n) => (typeof n === 'number' ? n.toFixed(2) : String(n));
        const ramS = ram.toFixed(2);

        if (type === 1) {
            if (diff === 'hard') {
                const num = (m1 * p1) + (m2 * p2) + (m3 * p3);
                if (l === 'zh') {
                    return `<p><strong>解題步驟</strong></p>
<p>相對原子質量 = [(質量₁×豐度₁) + (質量₂×豐度₂) + (質量₃×豐度₃)] ÷ 100</p>
<p>= [(${m1}×${p1}) + (${m2}×${p2}) + (${m3}×${p3})] ÷ 100 = ${num} ÷ 100 = <strong>${R(ans)}</strong></p>
<p>故 ${elName} 的相對原子質量約為 <strong>${R(ans)}</strong>。</p>`;
                }
                return `<p><strong>Worked solution</strong></p>
<p>RAM = [(m₁×%₁) + (m₂×%₂) + (m₃×%₃)] / 100</p>
<p>= [(${m1}×${p1}) + (${m2}×${p2}) + (${m3}×${p3})] / 100 = ${num} / 100 = <strong>${R(ans)}</strong></p>
<p>Relative atomic mass of ${elName} ≈ <strong>${R(ans)}</strong>.</p>`;
            }
            const num = (m1 * p1) + (m2 * p2);
            if (l === 'zh') {
                return `<p><strong>解題步驟</strong></p>
<p>相對原子質量 = [(${m1}×${p1}) + (${m2}×${p2})] ÷ 100 = ${num} ÷ 100 = <strong>${R(ans)}</strong></p>
<p>故 ${elName} 的相對原子質量約為 <strong>${R(ans)}</strong>。</p>`;
            }
            return `<p><strong>Worked solution</strong></p>
<p>RAM = [(${m1}×${p1}) + (${m2}×${p2})] / 100 = ${num} / 100 = <strong>${R(ans)}</strong></p>
<p>Relative atomic mass of ${elName} ≈ <strong>${R(ans)}</strong>.</p>`;
        }

        if (type === 2) {
            if (diff === 'hard') {
                if (l === 'zh') {
                    return `<p><strong>解題步驟</strong></p>
<p>設 ${elName}-${m1} 的豐度為 <em>x</em>%，則 ${elName}-${m2} 為 (100 − ${p3} − <em>x</em>)% = (${100 - p3} − <em>x</em>)%。</p>
<p>${ramS} = [${m1}<em>x</em> + ${m2}(${100 - p3} − <em>x</em>) + (${m3}×${p3})] ÷ 100</p>
<p>兩邊同乘 100，整理後可得 <em>x</em> ≈ <strong>${R(ans)}</strong>。</p>
<p>故 ${elName}-${m1} 的百分比豐度約為 <strong>${R(ans)}%</strong>。</p>`;
                }
                return `<p><strong>Worked solution</strong></p>
<p>Let abundance of ${elName}-${m1} be <em>x</em>%. Then ${elName}-${m2} is (${100 - p3} − <em>x</em>)%.</p>
<p>${ramS} = [${m1}<em>x</em> + ${m2}(${100 - p3} − <em>x</em>) + (${m3}×${p3})] / 100</p>
<p>Multiply by 100 and rearrange → <em>x</em> ≈ <strong>${R(ans)}</strong>.</p>
<p>% abundance of ${elName}-${m1} ≈ <strong>${R(ans)}%</strong>.</p>`;
            }
            if (l === 'zh') {
                return `<p><strong>解題步驟</strong></p>
<p>設 ${elName}-${m1} 為 <em>x</em>%，則 ${elName}-${m2} 為 (100 − <em>x</em>)%。</p>
<p>${ramS} = [${m1}<em>x</em> + ${m2}(100 − <em>x</em>)] ÷ 100 → 100×${ramS} = ${m1}<em>x</em> + ${m2}(100 − <em>x</em>)</p>
<p>整理得 <em>x</em> = (100×${ramS} − ${m2}×100) ÷ (${m1} − ${m2}) ≈ <strong>${R(ans)}</strong>。</p>
<p>故 ${elName}-${m1} 的百分比豐度約為 <strong>${R(ans)}%</strong>。</p>`;
            }
            return `<p><strong>Worked solution</strong></p>
<p>Let abundance of ${elName}-${m1} be <em>x</em>%. Then ${elName}-${m2} is (100 − <em>x</em>)%.</p>
<p>${ramS} = [${m1}<em>x</em> + ${m2}(100 − <em>x</em>)] / 100 → 100×${ramS} = ${m1}<em>x</em> + ${m2}(100 − <em>x</em>)</p>
<p>Solve → <em>x</em> ≈ <strong>${R(ans)}</strong>.</p>
<p>% abundance of ${elName}-${m1} ≈ <strong>${R(ans)}%</strong>.</p>`;
        }

        /* type 3 — isotopic mass */
        if (diff === 'hard') {
            const rhs = 100 * ram - m1 * p1 - m2 * p2;
            if (l === 'zh') {
                return `<p><strong>解題步驟</strong></p>
<p>設第三種同位素質量為 <em>m</em>。</p>
<p>${ramS} = [(${m1}×${p1}) + (${m2}×${p2}) + (<em>m</em>×${p3})] ÷ 100</p>
<p>100×${ramS} − (${m1}×${p1}) − (${m2}×${p2}) = ${p3}×<em>m</em> → <em>m</em> = ${rhs.toFixed(2)} ÷ ${p3} ≈ <strong>${R(ans)}</strong></p>
<p>故該同位素質量約為 <strong>${R(ans)}</strong>。</p>`;
            }
            return `<p><strong>Worked solution</strong></p>
<p>Let the third isotopic mass be <em>m</em>.</p>
<p>${ramS} = [(${m1}×${p1}) + (${m2}×${p2}) + (<em>m</em>×${p3})] / 100</p>
<p><em>m</em> = (100×${ramS} − ${m1}×${p1} − ${m2}×${p2}) / ${p3} ≈ <strong>${R(ans)}</strong>.</p>
<p>Isotopic mass ≈ <strong>${R(ans)}</strong>.</p>`;
        }
        const rhs = 100 * ram - m1 * p1;
        if (l === 'zh') {
            return `<p><strong>解題步驟</strong></p>
<p>設未知同位素質量為 <em>m</em>。</p>
<p>${ramS} = [(${m1}×${p1}) + (<em>m</em>×${p2})] ÷ 100 → 100×${ramS} − (${m1}×${p1}) = ${p2}×<em>m</em></p>
<p><em>m</em> = ${rhs.toFixed(2)} ÷ ${p2} ≈ <strong>${R(ans)}</strong></p>
<p>故該同位素質量約為 <strong>${R(ans)}</strong>。</p>`;
        }
        return `<p><strong>Worked solution</strong></p>
<p>Let the unknown isotopic mass be <em>m</em>.</p>
<p>${ramS} = [(${m1}×${p1}) + (<em>m</em>×${p2})] / 100 → <em>m</em> = (100×${ramS} − ${m1}×${p1}) / ${p2} ≈ <strong>${R(ans)}</strong>.</p>
<p>Isotopic mass ≈ <strong>${R(ans)}</strong>.</p>`;
    }

    function revFill(template, map) {
        let out = template;
        Object.keys(map).forEach((k) => {
            out = out.split('{' + k + '}').join(map[k]);
        });
        return out;
    }

    function buildRevisionSuggestionsRAM(lang, total, correct, firstTry, failed, incomplete, byType) {
        const lines = [];
        const seen = new Set();
        function addLine(s) {
            if (!s || seen.has(s)) return;
            seen.add(s);
            lines.push(s);
        }
        const pctAll = total ? Math.round((100 * correct) / total) : 0;
        const ftPctAll = total ? Math.round((100 * firstTry) / total) : 0;

        if (pctAll >= 85) addLine(T('revBandExcellent', lang));
        else if (pctAll >= 65) addLine(T('revBandGood', lang));
        else if (pctAll >= 40) addLine(T('revBandFair', lang));
        else addLine(T('revBandLow', lang));

        const typeRows = [];
        byType.forEach((agg, tid) => {
            if (!agg || !agg.total) return;
            const n = Number(tid);
            const pct = Math.round((100 * agg.correct) / agg.total);
            typeRows.push({
                name: qTypeLongLabel(lang, n),
                total: agg.total,
                correct: agg.correct,
                firstTry: agg.firstTry,
                pct
            });
        });
        typeRows.sort((a, b) => a.pct - b.pct || b.total - a.total);

        let weakPick = typeRows.filter((r) => r.total >= 2 && r.pct < 66);
        if (!weakPick.length) weakPick = typeRows.filter((r) => r.total >= 1 && r.pct < 50);
        weakPick = weakPick.slice(0, 2);

        weakPick.forEach((r) => {
            addLine(
                revFill(T('revWeakOne', lang), {
                    type: r.name,
                    c: String(r.correct),
                    t: String(r.total),
                    pct: String(r.pct)
                })
            );
        });

        const strongOnes = typeRows.filter((r) => r.total >= 2 && r.pct === 100);
        if (strongOnes.length && !weakPick.length) {
            const r0 = strongOnes[0];
            addLine(revFill(T('revStrongOne', lang), { type: r0.name, n: String(r0.total) }));
        }

        if (total >= 4 && pctAll >= 45 && ftPctAll < 40) {
            addLine(T('revFirstTryLow', lang));
        }
        if (failed.length) addLine(T('revThreeStrike', lang));
        if (incomplete.length) addLine(T('revIncomplete', lang));
        if (!weakPick.length && typeRows.length >= 2 && pctAll >= 35 && pctAll < 78) {
            addLine(T('revBalanced', lang));
        }

        return lines;
    }

    function renderSessionAnalysis() {
        const l = getLang();
        const qs = window.questionData;
        if (!qs || !qs.length || !qs[0]) {
            alert(T('alertNoSheet'));
            return;
        }
        const total = qs.length;
        let correct = 0;
        let firstTry = 0;
        const failed = [];
        const incomplete = [];
        const byType = new Map();
        qs.forEach((d, idx) => {
            if (!d) return;
            const tid = String(d.type);
            if (!byType.has(tid)) {
                byType.set(tid, { total: 0, correct: 0, firstTry: 0 });
            }
            const agg = byType.get(tid);
            agg.total += 1;
            const att = d.attempts || 0;
            const solved = d.solved;
            if (solved) {
                agg.correct += 1;
                if (att === 0) agg.firstTry += 1;
            }
            if (solved) {
                correct += 1;
                if (att === 0) firstTry += 1;
            } else if (att >= 3) {
                failed.push({ n: idx + 1, q: d });
            } else {
                incomplete.push(idx + 1);
            }
        });

        let html = '<h3>' + escapeHtml(T('analysisTitle', l)) + '</h3>';
        html += '<div class="summary-score">' + escapeHtml(T('summaryScoreLabel', l)) + '：' + correct + ' / ' + total + '</div>';
        html += '<p class="summary-sub">' + escapeHtml(T('summaryFirstTry', l)) + '：' + firstTry + ' / ' + total + '</p>';

        html += '<div class="summary-by-type-title">' + escapeHtml(T('summaryByTypeTitle', l)) + '</div>';
        html += '<table class="summary-type-table" aria-label="' + escapeHtml(T('summaryByTypeTitle', l)) + '">';
        html +=
            '<thead><tr><th>' +
            escapeHtml(T('summaryByTypeColType', l)) +
            '</th><th class="num">' +
            escapeHtml(T('summaryByTypeColFraction', l)) +
            '</th><th class="num">' +
            escapeHtml(T('summaryByTypeColRate', l)) +
            '</th><th class="num">' +
            escapeHtml(T('summaryByTypeColFirst', l)) +
            '</th></tr></thead><tbody>';
        [1, 2, 3].forEach((typeNum) => {
            const agg = byType.get(String(typeNum));
            if (!agg || !agg.total) return;
            const pct = Math.round((100 * agg.correct) / agg.total);
            const ftPct = Math.round((100 * agg.firstTry) / agg.total);
            const name = qTypeLongLabel(l, typeNum);
            html +=
                '<tr><td><span class="type-name">' +
                escapeHtml(name) +
                '</span> <span class="type-code-cell">(type ' +
                typeNum +
                ')</span></td><td class="num">' +
                agg.correct +
                ' / ' +
                agg.total +
                '</td><td class="num">' +
                pct +
                '%</td><td class="num">' +
                agg.firstTry +
                ' / ' +
                agg.total +
                ' (' +
                ftPct +
                '%)</td></tr>';
        });
        html += '</tbody></table>';

        const revLines = buildRevisionSuggestionsRAM(l, total, correct, firstTry, failed, incomplete, byType);
        html += '<div class="summary-revision"><h4>' + escapeHtml(T('revTitle', l)) + '</h4><ul>';
        revLines.forEach((line) => {
            html += '<li>' + escapeHtml(line) + '</li>';
        });
        html += '</ul></div>';

        html += '<div class="summary-wrong-title">' + escapeHtml(T('summaryWrongTitle', l)) + '</div>';
        if (!failed.length) {
            html += '<p class="summary-none">' + escapeHtml(T('summaryNoneWrong', l)) + '</p>';
        } else {
            html += '<ul class="summary-wrong-list">';
            failed.forEach((f) => {
                const label = qTypeLongLabel(l, f.q.type);
                html +=
                    '<li>Q' +
                    f.n +
                    ' · ' +
                    escapeHtml(label) +
                    ' <span class="type-code">(type ' +
                    f.q.type +
                    ')</span></li>';
            });
            html += '</ul>';
        }
        if (incomplete.length) {
            html +=
                '<p class="summary-sub" style="margin-top:0.75rem">' +
                escapeHtml(T('summaryIncomplete', l)) +
                '：' +
                incomplete.map((x) => 'Q' + x).join(l === 'zh' ? '、' : ', ') +
                '</p>';
        }

        const panel = document.getElementById('session-analysis-panel');
        panel.hidden = false;
        panel.innerHTML = html;

        if (previewTabsCtrl) previewTabsCtrl.setMode('practice');
    }

    function downloadAsWordFile(htmlString, filename) {

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function createQuestionData(type, diff, index, elName, l) {
        let m1, m2, m3, p1, p2, p3, ram, qText, ans, hint1, hint2;

        m1 = randInt(10, 80);
        m2 = m1 + randInt(1, 4);
        m3 = m2 + randInt(1, 4);

        if (diff === 'easy') {
            p1 = randInt(1, 4) * 20; p2 = 100 - p1; p3 = 0;
        } else if (diff === 'medium') {
            p1 = randInt(15, 85); p2 = 100 - p1; p3 = 0;
        } else {
            p1 = randInt(30, 60); p2 = randInt(10, 30); p3 = 100 - p1 - p2;
        }

        ram = (diff === 'hard') ? ((m1*p1)+(m2*p2)+(m3*p3))/100 : ((m1*p1)+(m2*p2))/100;

        if (type === 1) {
            ans = ram;
            if (l === 'zh') {
                qText = (diff==='hard') ? `元素 ${elName} 有三種同位素：${elName}-${m1} (${p1}%)、${elName}-${m2} (${p2}%) 及 ${elName}-${m3} (${p3}%)。計算 ${elName} 的相對原子質量。` : `元素 ${elName} 有兩種同位素：${elName}-${m1} (豐度為 ${p1}%) 及 ${elName}-${m2} (豐度為 ${p2}%)。計算 ${elName} 的相對原子質量。`;
                hint1 = "提示 1：相對原子質量 = (質量1 × 豐度1) + (質量2 × 豐度2) + ... 注意百分比需除以 100。";
                hint2 = (diff==='hard') ? `提示 2 (步驟)：<br>RAM = [(${m1} × ${p1}) + (${m2} × ${p2}) + (${m3} × ${p3})] / 100` : `提示 2 (步驟)：<br>RAM = [(${m1} × ${p1}) + (${m2} × ${p2})] / 100`;
            } else {
                qText = (diff==='hard') ? `Element ${elName} has three isotopes: ${elName}-${m1} (${p1}%), ${elName}-${m2} (${p2}%), and ${elName}-${m3} (${p3}%). Calculate the relative atomic mass.` : `Element ${elName} has two isotopes: ${elName}-${m1} (${p1}%) and ${elName}-${m2} (${p2}%). Calculate the relative atomic mass.`;
                hint1 = "Hint 1: RAM = (Mass1 × %1) + (Mass2 × %2)... Remember to divide by 100.";
                hint2 = (diff==='hard') ? `Hint 2 (Steps):<br>RAM = [(${m1} × ${p1}) + (${m2} × ${p2}) + (${m3} × ${p3})] / 100` : `Hint 2 (Steps):<br>RAM = [(${m1} × ${p1}) + (${m2} × ${p2})] / 100`;
            }
        } else if (type === 2) {
            ans = p1;
            let p2Expr = (diff==='hard') ? `(100 - ${p3} - x)` : `(100 - x)`;
            if (l === 'zh') {
                qText = (diff==='hard') ? `元素 ${elName} 有三種同位素：${elName}-${m1}、${elName}-${m2} 及 ${elName}-${m3}。相對原子質量為 ${ram.toFixed(2)}。已知 ${elName}-${m3} 的豐度為 ${p3}%，求 ${elName}-${m1} 的百分比豐度。` : `元素 ${elName} 有兩種同位素：${elName}-${m1} 及 ${elName}-${m2}。其相對原子質量為 ${ram.toFixed(2)}。求 ${elName}-${m1} 的百分比豐度。`;
                hint1 = "提示 1：設未知豐度為 x%，則另一同位素為 (100 - 已知% - x)%。代入公式求解 x。";
                hint2 = `提示 2 (步驟)：<br>設 ${elName}-${m1} 的豐度為 x%。<br>${ram.toFixed(2)} = [${m1}x + ${m2}${p2Expr}` + (diff==='hard' ? ` + (${m3} × ${p3})` : "") + `] / 100<br>展開括號並解出 x。`;
            } else {
                qText = `Element ${elName} has isotopes ${elName}-${m1} and ${elName}-${m2}. The RAM is ${ram.toFixed(2)}. Calculate the % abundance of ${elName}-${m1}.`;
                if(diff === 'hard') qText = `Element ${elName} has isotopes ${elName}-${m1}, ${elName}-${m2}, and ${elName}-${m3} (${p3}%). The RAM is ${ram.toFixed(2)}. Calculate the % abundance of ${elName}-${m1}.`;
                
                hint1 = "Hint 1: Let abundance of isotope 1 be x%. Then isotope 2 is (100 - known% - x)%. Solve for x.";
                hint2 = `Hint 2 (Steps):<br>Let the abundance of ${elName}-${m1} be x%.<br>${ram.toFixed(2)} = [${m1}x + ${m2}${p2Expr}` + (diff==='hard' ? ` + (${m3} × ${p3})` : "") + `] / 100<br>Expand the brackets and solve for x.`;
            }
        } else {
            ans = (diff==='hard') ? m3 : m2;
            if (l === 'zh') {
                qText = (diff==='hard') ? `元素 ${elName} 的相對原子質量為 ${ram.toFixed(2)}。其中兩款同位素為 ${elName}-${m1} (${p1}%) 及 ${elName}-${m2} (${p2}%)。求第三種豐度為 ${p3}% 的同位素質量。` : `元素 ${elName} 的相對原子質量為 ${ram.toFixed(2)}。其中一款同位素為 ${elName}-${m1} (${p1}%)。求另一款豐度為 ${p2}% 的同位素質量。`;
                hint1 = "提示 1：將所有數值代入 RAM 公式，設未知質量為 m，解方程求出 m。";
                hint2 = `提示 2 (步驟)：<br>設未知同位素質量為 m。<br>${ram.toFixed(2)} = [(${m1} × ${p1}) + ` + (diff==='hard' ? `(${m2} × ${p2}) + (m × ${p3})` : `(m × ${p2})`) + `] / 100<br>解出 m。`;
            } else {
                qText = (diff==='hard') ? `Element ${elName} (RAM ${ram.toFixed(2)}) has isotopes ${elName}-${m1} (${p1}%) and ${elName}-${m2} (${p2}%). Calculate the isotopic mass of the third isotope (abundance ${p3}%).` : `Element ${elName} (RAM ${ram.toFixed(2)}) has an isotope ${elName}-${m1} (${p1}%). Calculate the isotopic mass of the other isotope (abundance ${p2}%).`;
                hint1 = "Hint 1: Use the RAM formula, set the unknown mass as 'm', and solve the equation.";
                hint2 = `Hint 2 (Steps):<br>Let the unknown mass be m.<br>${ram.toFixed(2)} = [(${m1} × ${p1}) + ` + (diff==='hard' ? `(${m2} × ${p2}) + (m × ${p3})` : `(m × ${p2})`) + `] / 100<br>Solve for m.`;
            }
        }

        const fullSolution = buildFullSolution({
            type,
            diff,
            l,
            elName,
            m1,
            m2,
            m3,
            p1,
            p2,
            p3,
            ram,
            ans: parseFloat(ans.toFixed(2))
        });

        window.questionData[index] = {
            ans: parseFloat(ans.toFixed(2)),
            hint1,
            hint2,
            attempts: 0,
            solved: false,
            checkSubmissions: 0,
            type,
            qText,
            fullSolution
        };
    }

    function checkAnswer(index, l) {
        const raw = document.getElementById('ans_' + index).value;
        const userVal = parseFloat(raw);
        const data = window.questionData[index];
        const fb = document.getElementById('fb_' + index);
        const ht = document.getElementById('hint_' + index);

        if (raw === '' || raw === null || Number.isNaN(userVal)) {
            fb.innerText = l === 'zh' ? '請輸入數字答案。' : 'Please enter a numeric answer.';
            fb.style.color = '#c0392b';
            updateProgressUI(l);
            return;
        }
        data.checkSubmissions = (data.checkSubmissions || 0) + 1;

        if (Math.abs(userVal - data.ans) <= 0.05) {
            fb.innerText = i18n[l].correct;
            fb.style.color = "#27ae60";
            ht.style.display = 'none';
            data.solved = true;
            maybeShowSummary(l);
        } else {
            data.attempts++;
            if (data.attempts === 1) {
                fb.innerText = i18n[l].wrong1; 
                fb.style.color = "#c0392b";
                ht.innerHTML = data.hint1; 
                ht.style.display = 'block';
            } else if (data.attempts === 2) {
                fb.innerText = i18n[l].wrong2; 
                fb.style.color = "#c0392b";
                ht.innerHTML = data.hint1 + "<br><br>" + data.hint2; 
            } else {
                fb.innerText = i18n[l].finalWrong + data.ans;
                fb.style.color = "#c0392b";
            }
        }
        updateProgressUI(l);
    }

    document.addEventListener('DOMContentLoaded', function () {
        previewTabsCtrl = window.Ch5EmbedUI.bindPreviewTabs('.preview-tab', {
            panels: {
                print: document.getElementById('printView'),
                practice: document.getElementById('practiceView'),
                answer: document.getElementById('answerView'),
            },
            placeholder: document.getElementById('previewPlaceholder'),
            hasContent: hasWorksheetData,
            defaultMode: 'print',
        });

        window.Ch5EmbedUI.bindOptionGroup(document.getElementById('difficulty-group'), {
            hiddenInput: document.getElementById('diff'),
            onChange: setDifficulty,
        });

        window.Ch5EmbedUI.bindOptionGroup(document.getElementById('question-count-group'), {
            hiddenInput: document.getElementById('numQs'),
        });

        document.getElementById('ui-btn-gen').addEventListener('click', generateWorksheet);
        document.getElementById('btnLangEn').addEventListener('click', () => setLang('en'));
        document.getElementById('btnLangZh').addEventListener('click', () => setLang('zh'));
        document.getElementById('btn-session-summary').addEventListener('click', renderSessionAnalysis);
        document.getElementById('ui-btn-print').addEventListener('click', printCurrentView);
        document.getElementById('ui-btn-solutions-pdf').addEventListener('click', openSolutionsPdf);
        document.getElementById('ui-btn-solutions-doc').addEventListener('click', downloadSolutionsDoc);
        document.getElementById('ui-btn-worksheet-doc').addEventListener('click', downloadWorksheetDoc);

        setExportButtonsEnabled(false);
        updateUI();
        setDifficulty(document.getElementById('diff').value);
        syncCountPills();
    });
</script>
